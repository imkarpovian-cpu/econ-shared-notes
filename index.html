<style>
:root {
  --accent: #2563eb;
  --accent-dark: #1e40af;
  --accent-light: #dbeafe;
  --ink: #1f2937;
  --sub: #6b7280;
  --bg: #f8fafc;
  --card: #ffffff;
  --line: #e5e7eb;
  --hero-bg: #0f172a;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
  line-height: 1.7;
  font-size: 16px;
}

/* ── Navbar ── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.navbar .logo { font-weight: 700; font-size: .95em; color: var(--ink); }

/* ── Hero ── */
.hero {
  position: relative;
  background: var(--hero-bg);
  border-radius: var(--radius);
  margin: 20px 24px 0;
  padding: 56px 40px;
  overflow: hidden;
  color: #fff;
}
.hero canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: .35;
}
.hero-content { position: relative; z-index: 1; }
.hero .kicker {
  font-size: .85em;
  font-weight: 700;
  letter-spacing: .15em;
  color: #60a5fa;
  margin-bottom: 8px;
}
.hero h1 {
  font-size: 2em;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.3;
}
.hero .subtitle {
  font-size: .95em;
  opacity: .7;
}

/* ── Main ── */
.main { max-width: 1100px; margin: 0 auto; padding: 0 24px 64px; }
.section-title {
  font-size: 1.4em;
  font-weight: 800;
  margin: 40px 0 20px;
}

/* ── Subject Cards ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.card {
  display: flex; flex-direction: column;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 24px;
  text-decoration: none;
  color: var(--ink);
  transition: box-shadow .2s, border-color .2s, transform .15s;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(37,99,235,.12);
  transform: translateY(-2px);
}
.card .tag {
  display: inline-block;
  font-size: .75em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.card .card-title {
  font-size: 1.2em;
  font-weight: 700;
  margin-bottom: 6px;
}
.card .card-meta {
  font-size: .85em;
  color: var(--sub);
  margin-bottom: 12px;
}
.card .card-links {
  display: flex; gap: 8px; margin-top: auto;
}
.card .card-links a {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .82em;
  font-weight: 600;
  color: var(--accent);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--accent-light);
  transition: background .15s;
}
.card .card-links a:hover {
  background: #bfdbfe;
}
.card .card-links a svg {
  width: 14px; height: 14px; fill: currentColor;
}

/* ── Notice ── */
.notice {
  font-size: .88em;
  color: var(--sub);
  margin: 24px 0 0;
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 32px 24px;
  font-size: .82em;
  color: var(--sub);
  border-top: 1px solid var(--line);
  margin-top: 48px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .hero { margin: 12px 12px 0; padding: 36px 24px; }
  .hero h1 { font-size: 1.5em; }
  .main { padding: 0 12px 48px; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>

<script>
// Network animation (hero background)
(function() {
  const c = document.getElementById('network');
  const ctx = c.getContext('2d');
  let w, h, pts = [];
  function resize() {
    const r = c.parentElement.getBoundingClientRect();
    w = c.width = r.width * devicePixelRatio;
    h = c.height = r.height * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  function init() {
    resize();
    const rw = c.parentElement.getBoundingClientRect().width;
    const rh = c.parentElement.getBoundingClientRect().height;
    pts = [];
    for (let i = 0; i < 30; i++) {
      pts.push({
        x: Math.random() * rw,
        y: Math.random() * rh,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        r: Math.random() * 2 + 1.5,
        color: Math.random() > .8 ? '#eab308' : '#94a3b8'
      });
    }
  }
  function draw() {
    const rw = c.parentElement.getBoundingClientRect().width;
    const rh = c.parentElement.getBoundingClientRect().height;
    ctx.clearRect(0, 0, rw, rh);
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      a.x += a.vx; a.y += a.vy;
      if (a.x < 0 || a.x > rw) a.vx *= -1;
      if (a.y < 0 || a.y > rh) a.vy *= -1;
      for (let j = i + 1; j < pts.length; j++) {
        const b = pts[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 180) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = 'rgba(148,163,184,' + (.35 * (1 - d / 180)) + ')';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
      ctx.fillStyle = a.color;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  init();
  draw();
  window.addEventListener('resize', init);
})();
</script>
