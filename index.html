<style>
:root {
  --accent: #2563eb;
  --accent-dark: #1e40af;
  --accent-light: #dbeafe;
  --ink: #1f2937;
  --sub: #6b7280;
  --bg: #f8fafc;
  --card: #ffffff;
  --line: #e5e7eb;
  --hero-bg: #0f172a;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
  line-height: 1.7;
  font-size: 16px;
}

/* ── Navbar ── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.navbar .logo { font-weight: 700; font-size: .95em; color: var(--ink); }

/* ── Hero ── */
.hero {
  position: relative;
  background: var(--hero-bg);
  border-radius: var(--radius);
  margin: 20px 24px 0;
  padding: 56px 40px;
  overflow: hidden;
  color: #fff;
}
.hero canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: .35;
}
.hero-content { position: relative; z-index: 1; }
.hero .kicker {
  font-size: .85em;
  font-weight: 700;
  letter-spacing: .15em;
  color: #60a5fa;
  margin-bottom: 8px;
}
.hero h1 {
  font-size: 2em;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.3;
}
.hero .subtitle {
  font-size: .95em;
  opacity: .7;
}

/* ── Main ── */
.main { max-width: 1100px; margin: 0 auto; padding: 0 24px 64px; }
.section-title {
  font-size: 1.4em;
  font-weight: 800;
  margin: 40px 0 20px;
}

/* ── Subject Cards ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.card {
  display: flex; flex-direction: column;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 24px;
  text-decoration: none;
  color: var(--ink);
  transition: box-shadow .2s, border-color .2s, transform .15s;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(37,99,235,.12);
  transform: translateY(-2px);
}
.card .tag {
  display: inline-block;
  font-size: .75em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.card .card-title {
  font-size: 1.2em;
  font-weight: 700;
  margin-bottom: 6px;
}
.card .card-meta {
  font-size: .85em;
  color: var(--sub);
  margin-bottom: 12px;
}
.card .card-links {
  display: flex; gap: 8px; margin-top: auto;
}
.card .card-links a {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .82em;
  font-weight: 600;
  color: var(--accent);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--accent-light);
  transition: background .15s;
}
.card .card-links a:hover {
  background: #bfdbfe;
}
.card .card-links a svg {
  width: 14px; height: 14px; fill: currentColor;
}

/* ── Notice ── */
.notice {
  font-size: .88em;
  color: var(--sub);
  margin: 24px 0 0;
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 32px 24px;
  font-size: .82em;
  color: var(--sub);
  border-top: 1px solid var(--line);
  margin-top: 48px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .hero { margin: 12px 12px 0; padding: 36px 24px; }
  .hero h1 { font-size: 1.5em; }
  .main { padding: 0 12px 48px; }
  .card-grid { grid-template-columns: 1fr; }
}

<script>
// Econ animation (hero background): supply-demand curves + bar chart
(function() {
  const c = document.getElementById('econ');
  const ctx = c.getContext('2d');
  const dpr = devicePixelRatio || 1;
  let rw, rh, t = 0;

  function resize() {
    const r = c.parentElement.getBoundingClientRect();
    rw = r.width; rh = r.height;
    c.width = rw * dpr; c.height = rh * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function draw() {
    t += 0.004;
    ctx.clearRect(0, 0, rw, rh);

    const ox = rw * 0.56, oy = rh * 0.88;
    const axW = rw * 0.40, axH = rh * 0.72;
    const shift = Math.sin(t) * 16;

    // grid
    ctx.strokeStyle = 'rgba(148,163,184,.08)';
    ctx.lineWidth = 1;
    for (let g = 1; g <= 5; g++) {
      const gx = ox + (axW / 5) * g;
      const gy = oy - (axH / 5) * g;
      ctx.beginPath(); ctx.moveTo(gx, oy); ctx.lineTo(gx, oy - axH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox, gy); ctx.lineTo(ox + axW, gy); ctx.stroke();
    }

    // axes
    ctx.strokeStyle = 'rgba(148,163,184,.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ox, oy - axH - 6); ctx.lineTo(ox, oy); ctx.lineTo(ox + axW + 6, oy);
    ctx.stroke();

    // axis labels
    ctx.fillStyle = 'rgba(148,163,184,.5)';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Q', ox + axW + 16, oy + 4);
    ctx.fillText('P', ox - 4, oy - axH - 12);

    // demand curve (down-sloping, shifts with t)
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(96,165,250,.85)';
    ctx.lineWidth = 2.5;
    for (let i = 0; i <= 50; i++) {
      const tt = i / 50;
      const dx = ox + tt * axW + shift;
      const dy = oy - (1 - tt * 0.82) * axH * 0.95;
      if (i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
    }
    ctx.stroke();

    // supply curve (up-sloping, shifts opposite)
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(251,191,36,.85)';
    ctx.lineWidth = 2.5;
    for (let i = 0; i <= 50; i++) {
      const tt = i / 50;
      const sx = ox + tt * axW - shift;
      const sy = oy - (0.08 + tt * 0.78) * axH * 0.95;
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // equilibrium point (exact intersection of the two shifted curves)
    // demand: y-param = 1 - 0.82*tt (at x = ox + tt*axW + shift)
    // supply: y-param = 0.08 + 0.78*ss (at x = ox + ss*axW - shift)
    // equate x and y to solve for tt
    const eqT = (0.92 - 1.56 * shift / axW) / 1.6;
    const eqX = ox + eqT * axW + shift;
    const eqY = oy - (1 - eqT * 0.82) * axH * 0.95;
    const pulse = 4 + Math.sin(t * 3) * 1.5;
    ctx.beginPath();
    ctx.arc(eqX, eqY, pulse, 0, Math.PI * 2);
    ctx.fillStyle = '#eab308';
    ctx.fill();

    // dashed guides from equilibrium
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(234,179,8,.35)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(eqX, eqY); ctx.lineTo(eqX, oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eqX, eqY); ctx.lineTo(ox, eqY); ctx.stroke();
    ctx.setLineDash([]);

    // curve labels
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(96,165,250,.8)';
    ctx.fillText('D', ox + axW * 0.9 + shift, oy - axH * 0.12);
    ctx.fillStyle = 'rgba(251,191,36,.8)';
    ctx.fillText('S', ox + axW * 0.9 - shift, oy - axH * 0.82);

    // bar chart silhouette (left side, gentle growth pulse)
    const nBars = 7;
    const barW = rw * 0.028;
    const gap = barW * 0.5;
    const barBase = rh * 0.88;
    const bx0 = rw * 0.06;
    const hts = [0.22, 0.30, 0.27, 0.38, 0.46, 0.42, 0.55];
    for (let i = 0; i < nBars; i++) {
      const bh = hts[i] * rh * (0.92 + 0.08 * Math.sin(t * 2 + i * 0.7));
      ctx.fillStyle = 'rgba(148,163,184,' + (0.10 + i * 0.015) + ')';
      ctx.fillRect(bx0 + i * (barW + gap), barBase - bh, barW, bh);
    }
    // trend line over bars
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(52,211,153,.4)';
    ctx.lineWidth = 2;
    for (let i = 0; i < nBars; i++) {
      const bh = hts[i] * rh * (0.92 + 0.08 * Math.sin(t * 2 + i * 0.7));
      const px = bx0 + i * (barW + gap) + barW / 2;
      const py = barBase - bh - 8;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  resize();
  draw();
  window.addEventListener('resize', resize);
})();
</script>
